<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SKU MINER V3.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0f1a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-10">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-black text-white mb-8 uppercase tracking-tighter">SKU <span class="text-blue-500">Miner</span></h1>
        
        <div class="grid grid-cols-12 gap-8">
            <div class="col-span-4 glass p-8 rounded-3xl">
                <label class="text-[10px] font-bold text-slate-500 uppercase block mb-2">Model Input</label>
                <textarea id="model-input" rows="6" class="w-full bg-slate-900 border border-white/10 rounded-xl p-4 text-sm mb-4 outline-none focus:border-blue-500" placeholder="SM-E076BDBAINS"></textarea>
                <button onclick="triggerMining()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold text-xs uppercase tracking-widest transition-all">Start Sourcing</button>
            </div>

            <div class="col-span-8 glass rounded-3xl overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-[9px] text-slate-500 uppercase font-bold tracking-widest">
                        <tr>
                            <th class="p-6">Model</th>
                            <th class="p-6">Attributes</th>
                            <th class="p-6">Status</th>
                        </tr>
                    </thead>
                    <tbody id="results-body" class="divide-y divide-white/5 text-sm"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function triggerMining() {
            const input = document.getElementById('model-input').value.trim();
            if(!input) return;
            
            const body = document.getElementById('results-body');
            body.innerHTML = `<tr><td class="p-6 text-white">${input}</td><td class="p-6 text-slate-500 italic">Processing...</td><td class="p-6 text-blue-400 animate-pulse">RUNNING</td></tr>`;

            // Wait 5 seconds then try to fetch results.csv from GitHub
            setTimeout(loadData, 5000);
        }

        async function loadData() {
            try {
                // Ensure this URL points to your actual CSV on GitHub
                const response = await fetch('results.csv?t=' + new Date().getTime());
                const csv = await response.text();
                const rows = csv.split('\n').slice(1);
                const body = document.getElementById('results-body');
                body.innerHTML = '';

                rows.forEach(row => {
                    const cols = row.split(',');
                    if(cols.length > 1) {
                        body.innerHTML += `
                        <tr class="hover:bg-white/[0.01]">
                            <td class="p-6 font-bold text-white">${cols[0]}</td>
                            <td class="p-6">
                                <span class="bg-blue-500/10 text-blue-400 px-2 py-1 rounded text-[10px] font-bold mr-2">${cols[1]}</span>
                                <span class="bg-emerald-500/10 text-emerald-400 px-2 py-1 rounded text-[10px] font-bold">${cols[2]}</span>
                            </td>
                            <td class="p-6 text-emerald-400 font-black text-[10px]">${cols[5]}</td>
                        </tr>`;
                    }
                });
            } catch (e) { console.log("Waiting for file update..."); }
        }
    </script>
</body>
</html>
