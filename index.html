<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Data Portal</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    textarea { width: 100%; height: 120px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; }
    th { background: #f4f4f4; }
    .not-found { color: red; }
  </style>
</head>
<body>

<h2>Product Data Mining Portal</h2>

<textarea id="inputModels" placeholder="Paste model numbers (one per line)"></textarea>
<br><br>

<label>Country Filter:</label>
<select id="countryFilter">
  <option value="ALL">All</option>
  <option value="IN">India</option>
  <option value="US">United States</option>
</select>

<button onclick="searchBulk()">Search</button>

<table id="resultTable">
  <thead>
    <tr>
      <th>Model</th>
      <th>Product</th>
      <th>Category</th>
      <th>Country</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
async function searchBulk() {
  const input = document.getElementById("inputModels").value
    .split("\\n")
    .map(i => i.trim())
    .filter(i => i);

  const country = document.getElementById("countryFilter").value;

  const res = await fetch("data.json");
  const data = await res.json();

  const tbody = document.querySelector("#resultTable tbody");
  tbody.innerHTML = "";

  input.forEach(model => {
    let result = data.find(p => p.model_no.toLowerCase() === model.toLowerCase());

    if (result && (country === "ALL" || result.country === country)) {
      addRow(result.model_no, result.product_name, result.category, result.country, "Found");
    } else {
      addRow(model, "-", "-", "-", "Not Found", true);
    }
  });
}

function addRow(model, name, category, country, status, notFound=false) {
  const row = document.createElement("tr");
  if (notFound) row.classList.add("not-found");

  row.innerHTML = `
    <td>${model}</td>
    <td>${name}</td>
    <td>${category}</td>
    <td>${country}</td>
    <td>${status}</td>
  `;

  document.querySelector("#resultTable tbody").appendChild(row);
}
</script>

</body>
</html>
